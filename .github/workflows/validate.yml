name: validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Validate skill frontmatter and manifests
        run: uv run scripts/validate_skills.py
      - name: Run installer tests
        run: uv run scripts/test_install_skills.py
      - name: Syntax-check tooling
        run: uv run python -m py_compile scripts/install_skills.py scripts/validate_skills.py scripts/test_install_skills.py
